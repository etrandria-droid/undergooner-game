<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undergooner</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d1829;
      font-family: 'Baloo 2', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(30,86,253,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 30%, rgba(220,42,75,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .countdown-screen {
      position: fixed;
      inset: 0;
      background: #0d1829;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 16px;
    }

    .countdown-round-label {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .countdown-number {
      font-size: 160px;
      font-weight: 800;
      color: white;
      animation: countPop 0.4s ease;
      text-shadow: 0 0 60px rgba(30,86,253,0.9);
      line-height: 1;
    }

    @keyframes countPop {
      0% { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .game-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1200px;
      padding: 16px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

.top-bar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}

.word-display {
  background: linear-gradient(135deg, #0b1d3a, #142c54);
  border: 1px solid rgba(30,86,253,0.3);
  border-radius: 14px;
  padding: 10px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2px;
  grid-column: 2;
}

    .word-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .word-value {
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: 3px;
    }

.round-indicator {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  grid-column: 3;
}

    .round-label {
      color: white;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(30,86,253,0.5);
      white-space: nowrap;
    }

    .timer-zone {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .timer-wrap {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, #1e56fd, #3aa0ff);
      border-radius: 10px;
      transition: width 1s linear;
      width: 100%;
    }

    .timer-bar.urgent { background: linear-gradient(90deg, #dc2a4b, #ff6a7a); }

    .timer-count {
      font-size: 20px;
      font-weight: 800;
      color: white;
      min-width: 48px;
      text-align: right;
    }

    .timer-count.urgent { color: #ff4b5c; }

    .game-table-wrapper {
      display: flex;
      gap: 0;
      width: 100%;
    }

.row-labels {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-width: 90px;
  padding-bottom: 0;
}

    .row-label {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .game-table {
      flex: 1;
      display: flex;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
    }

    .player-col {
      flex: 1;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
    }

    .player-col:last-child { border-right: none; }

.player-header {
  padding: 16px 12px 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  min-height: 110px;
  height: auto;
  justify-content: center;
  transition: all 0.3s;
}

    .player-avatar { font-size: 38px; transition: all 0.3s; }

    .player-name {
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.7);
      text-align: center;
    }

    .player-score {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.08);
      width: 100%;
      text-align: center;
    }

    .player-col.me .player-header { background: rgba(220,42,75,0.08); border-bottom-color: rgba(220,42,75,0.2); }
    .player-col.me .player-name { color: #ff6a7a; }

    .player-col.active .player-header { background: rgba(255,215,0,0.08); border-bottom-color: rgba(255,215,0,0.3); }
    .player-col.active .player-name { color: #ffd700; }
    .player-col.active .player-avatar { filter: drop-shadow(0 0 12px rgba(255,215,0,0.6)); transform: scale(1.1); }

    .player-words { flex: 1; display: flex; flex-direction: column; }

    .word-cell {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 22px;
      font-weight: 800;
      color: white;
      padding: 8px;
      text-align: center;
      transition: all 0.3s;
    }

    .word-cell.filled { animation: wordIn 0.3s ease; }
    .word-cell.pending { color: rgba(255,255,255,0.12); font-size: 16px; }

    @keyframes wordIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .input-zone {
      background: linear-gradient(135deg, #0b1d3a, #0f2347);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 24px;
      display: none;
      align-items: center;
      gap: 16px;
      justify-content: center;
    }

    .turn-info {
      color: rgba(255,255,255,0.8);
      font-size: 18px;
      font-weight: 700;
      min-width: 200px;
    }

    .turn-info span { color: white; font-weight: 800; }

    .word-input {
      width: 200px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 16px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      text-align: center;
      transition: all 0.2s;
    }

    .word-input:focus { border-color: rgba(30,86,253,0.6); background: rgba(30,86,253,0.08); }
    .word-input:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn {
      background: linear-gradient(135deg, #1540c4, #1e56e0);
      border: none;
      border-radius: 12px;
      padding: 10px 22px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .vote-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #0b1d3a, #0f2347);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
    }

    .vote-title { color: white; font-size: 22px; font-weight: 800; }

    .vote-grid {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .vote-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 22px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      min-width: 100px;
    }

    .vote-card:hover:not(.disabled) { border-color: rgba(220,42,75,0.5); background: rgba(220,42,75,0.06); transform: scale(1.05); }
    .vote-card.selected { border-color: #ff4b5c; background: rgba(220,42,75,0.12); box-shadow: 0 0 20px rgba(220,42,75,0.3); }
    .vote-card.disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .vote-card-emoji { font-size: 34px; }
    .vote-card-name { font-size: 13px; font-weight: 700; color: white; margin-top: 6px; }

    .vote-confirm-btn {
      background: linear-gradient(135deg, #7a1228, #a01a35);
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }

    .vote-confirm-btn:hover { transform: scale(1.05); }
    .vote-waiting { color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600; }

    .mrwhite-guess-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #0b1d3a, #0f2347);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }

    .mrwhite-title { color: white; font-size: 20px; font-weight: 800; }
    .mrwhite-subtitle { color: rgba(255,255,255,0.5); font-size: 14px; }
    .mrwhite-timer { font-size: 36px; font-weight: 800; color: white; }

    .mrwhite-input-row { display: flex; gap: 12px; justify-content: center; }

    .mrwhite-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 16px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      text-align: center;
      width: 200px;
    }

    .mrwhite-btn {
      background: linear-gradient(135deg, #1540c4, #1e56e0);
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mrwhite-btn:hover { transform: scale(1.05); }

    .result-screen {
      background: linear-gradient(135deg, #0b1d3a, #0f2347);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      color: white;
      width: 100%;
    }

    .result-icon { font-size: 36px; margin-bottom: 6px; }

    .result-main-text {
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin: 8px 0;
      line-height: 1.3;
    }

    .result-words {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .result-words span {
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .civil-word { background: rgba(0,200,100,0.15); border: 1px solid rgba(0,200,100,0.4); color: #4dff91; }
    .undercover-word { background: rgba(220,42,75,0.15); border: 1px solid rgba(220,42,75,0.4); color: #ff6a7a; }

    .scores-zone {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .score-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 8px 14px;
      text-align: center;
      min-width: 75px;
    }

    .score-card-emoji { font-size: 22px; }
    .score-card-name { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 600; }
    .score-card-pts { font-size: 20px; font-weight: 800; color: white; }

    .next-btn {
      background: linear-gradient(135deg, #1540c4, #1e56e0);
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .next-btn:hover { transform: scale(1.05); }

    .gameover-screen { text-align: center; color: white; padding: 24px; }
    .gameover-screen h1 { font-size: 30px; font-weight: 800; margin-bottom: 16px; }

    .new-round-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,14,28,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      gap: 16px;
    }

    .new-round-label { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
    .new-round-number { font-size: 120px; font-weight: 800; color: white; text-shadow: 0 0 40px rgba(30,86,253,0.8); animation: countPop 0.4s ease; }

    .notif {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="countdown-screen" id="countdownScreen">
    <div class="countdown-round-label" id="countdownRoundLabel"></div>
    <div class="countdown-number" id="countdown"></div>
  </div>

  <div class="game-wrapper" id="gameWrapper">

    <div class="top-bar">
      <div class="word-display">
        <div class="word-label">Ton mot</div>
        <div class="word-value" id="wordDisplay"></div>
      </div>
      <div class="round-indicator">
        <div class="round-label" id="roundLabel">ROUND 1 / 10</div>
      </div>
    </div>

    <div class="timer-zone">
      <div class="timer-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="timer-count" id="timerCount"></div>
    </div>

    <div class="game-table-wrapper">
      <div class="row-labels" id="rowLabels"></div>
      <div class="game-table" id="gameTable"></div>
    </div>

    <div class="input-zone" id="inputZone">
      <div class="turn-info" id="turnInfo"></div>
      <input class="word-input" id="wordInput" placeholder="Ton indice..." maxlength="15" disabled/>
      <button class="send-btn" id="sendBtn" disabled>Envoyer ➤</button>
    </div>

    <div class="vote-screen" id="voteScreen">
      <p class="vote-title">🗳️ Qui est l'Undergooner ?</p>
      <div class="vote-grid" id="voteGrid"></div>
      <button class="vote-confirm-btn" id="voteConfirmBtn">Confirmer mon vote ✓</button>
      <p class="vote-waiting" id="voteWaiting"></p>
    </div>

    <div class="mrwhite-guess-screen" id="mrWhiteGuessScreen">
      <div class="mrwhite-title">⬜ Mr. White, devine le mot des civils !</div>
      <div class="mrwhite-subtitle" id="mrWhiteSubtitle"></div>
      <div class="mrwhite-timer" id="mrWhiteTimerDisplay"></div>
      <div class="mrwhite-input-row" id="mrWhiteInputRow">
        <input class="mrwhite-input" id="mrWhiteInput" placeholder="Le mot des civils..."/>
        <button class="mrwhite-btn" id="mrWhiteBtn">Valider</button>
      </div>
      <div id="mrWhiteWaiting" style="color:rgba(255,255,255,0.4);font-size:14px;display:none;">
        ⏳ En attente de Mr. White...
      </div>
    </div>

    <div id="resultZone"></div>

  </div>

</body>
</html>
